<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary -->
    <title>CauseHealth — Understand your bloodwork. Walk into your doctor armed.</title>
    <meta name="description" content="Upload any lab PDF. Get a doctor-grade summary in 30 seconds. The exact tests to ask for, plain-English explanations, and a 90-day plan to fix what's wrong. From $19/month." />
    <meta name="keywords" content="lab results explained, blood work analysis, ai health, ai labs, longevity, functional medicine, doctor prep, biomarker tracking" />
    <meta name="author" content="CauseHealth" />
    <link rel="canonical" href="https://causehealth.app/" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#1B4332" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#131313" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CauseHealth" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.svg" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.svg" />

    <!-- Open Graph (Facebook, LinkedIn, iMessage, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://causehealth.app/" />
    <meta property="og:title" content="CauseHealth — Understand your bloodwork." />
    <meta property="og:description" content="Upload any lab PDF. Get a doctor-grade summary in 30 seconds. Exact tests to ask for, plain-English explanations, 90-day plan." />
    <meta property="og:image" content="https://causehealth.app/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="CauseHealth" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://causehealth.app/" />
    <meta name="twitter:title" content="CauseHealth — Understand your bloodwork." />
    <meta name="twitter:description" content="Upload any lab PDF. Doctor-grade summary in 30 seconds. The intelligence layer your doctor doesn't have time for." />
    <meta name="twitter:image" content="https://causehealth.app/og-image.svg" />

    <!-- Robots / Search -->
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />

    <!-- Performance hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://iywyoolqhzdfreksgbbk.supabase.co" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <!-- Material Symbols: display=block hides content until font loads (vs swap
         which would briefly show raw ligature text like "auto_awesome" or "HEAL"). -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block"
      rel="stylesheet"
    />
    <!-- Belt-and-suspenders CSS so .material-symbols-outlined elements always
         use the right font + ligature feature, even before the Google Fonts
         CSS finishes loading. Google's stylesheet sets these properties too,
         but inlining them here means the rules apply on the very first paint. -->
    <style>
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined', sans-serif;
        font-weight: normal;
        font-style: normal;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-feature-settings: 'liga';
        -webkit-font-smoothing: antialiased;
        font-feature-settings: 'liga';
      }
    </style>

    <!-- Structured data: SoftwareApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "CauseHealth",
        "applicationCategory": "HealthApplication",
        "operatingSystem": "Web",
        "description": "Upload any lab PDF. Get a doctor-grade summary, exact tests to ask for, plain-English explanations, and a 90-day plan to fix what's wrong.",
        "offers": {
          "@type": "Offer",
          "price": "19.00",
          "priceCurrency": "USD",
          "priceValidUntil": "2027-12-31"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

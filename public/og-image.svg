<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#131313"/>
      <stop offset="100%" stop-color="#1B423A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#E8C29C"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Brand wordmark -->
  <text x="80" y="120" font-family="Fraunces, Georgia, serif" font-size="48" font-weight="700" fill="#FFFFFF">CauseHealth<tspan fill="#D4A574">.</tspan></text>

  <!-- Headline -->
  <text x="80" y="250" font-family="Fraunces, Georgia, serif" font-size="72" font-weight="700" fill="#FFFFFF">Understand your</text>
  <text x="80" y="335" font-family="Fraunces, Georgia, serif" font-size="72" font-weight="700" fill="url(#accent)">bloodwork.</text>

  <!-- Sub -->
  <text x="80" y="430" font-family="DM Sans, system-ui, sans-serif" font-size="32" font-weight="400" fill="#D8D2C5">Upload any lab PDF. Get a doctor-grade summary in 30 seconds.</text>

  <!-- Pricing chip -->
  <rect x="80" y="490" width="200" height="56" rx="28" fill="#D4A574"/>
  <text x="180" y="528" text-anchor="middle" font-family="DM Sans, system-ui, sans-serif" font-size="24" font-weight="700" fill="#131313">$19/month</text>

  <!-- Bullet chips -->
  <text x="320" y="528" font-family="DM Sans, system-ui, sans-serif" font-size="20" font-weight="500" fill="#A5D0B9">✓ Plain English  ✓ Doctor-ready  ✓ 90-day plan</text>

  <!-- Decorative dot bar -->
  <rect x="80" y="570" width="240" height="8" rx="4" fill="#C94F4F"/>
  <rect x="320" y="570" width="120" height="8" rx="4" fill="#E8922A"/>
  <rect x="440" y="570" width="320" height="8" rx="4" fill="#2A9D8F"/>
  <rect x="760" y="570" width="120" height="8" rx="4" fill="#E8922A"/>
  <rect x="880" y="570" width="240" height="8" rx="4" fill="#C94F4F"/>
  <circle cx="600" cy="574" r="14" fill="#FFFFFF" stroke="#2A9D8F" stroke-width="3"/>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<!--
  CauseHealth Facebook profile picture.
  1024x1024. Render as PNG at 512x512 for upload (Facebook displays 170x170).
  Designed for circle-crop: all content is well inside the safe circle.

  To export to PNG:
    - Open in Chrome / Firefox, screenshot, OR
    - https://cloudconvert.com/svg-to-png (drop file, set width=512), OR
    - In Figma: paste, select all, export 512x512 PNG.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Brand background: clinical-charcoal w/ subtle radial highlight -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#27574B" />
      <stop offset="100%" stop-color="#131313" />
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)" />

  <!-- Wordmark "Ch." — Fraunces serif, white with brand-gold period -->
  <!-- Falls back to system serif if Fraunces isn't installed at PNG-export time. -->
  <text
    x="512"
    y="640"
    font-family="'Fraunces', 'Times New Roman', serif"
    font-weight="700"
    font-size="540"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="-12"
  >Ch<tspan fill="#D4A574">.</tspan></text>

  <!-- Mono accent line above wordmark — JetBrains Mono uppercase tracking-widest -->
  <text
    x="512"
    y="320"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-weight="700"
    font-size="38"
    fill="#D4A574"
    text-anchor="middle"
    letter-spacing="14"
  >CLINICAL HEALTH INTELLIGENCE</text>
</svg>
